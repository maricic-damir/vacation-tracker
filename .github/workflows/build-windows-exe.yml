# Build VacationTracker.exe on Windows (PyInstaller does not cross-compile from macOS/Linux).
name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  pyinstaller:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller vacation_tracker.spec

      - uses: actions/upload-artifact@v4
        with:
          name: VacationTracker-windows
          path: dist/VacationTracker.exe
